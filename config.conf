# Workday Notify — configuration
# Edit times and messages to customize your schedule.
# Format: HH:MM | window | title | message | sound | command
# Sounds: default, Blow, Sosumi, Glass, Ping, Hero, etc.
# Command (optional): shell command to run when notification is clicked

name = "Superman's Workday"

[schedule]
# Each entry: time, window (minutes to keep showing), title, message, sound
# "late" is a special type that repeats every interval after the given time

08:00 | 75  | Good morning!       | Time to log in and start your day. | | daily login
10:30 | 15  | Break time          | 10:30 — stand up, stretch, grab water. 5–10 min.
12:30 | 15  | Lunch break         | Step away from the screen. Back at 13:30.
14:00 | 15  | Break time          | 14:00 — short break, rest your eyes.
15:30 | 15  | Break time          | 15:30 — stretch, walk around. Almost there.
16:00 | 15  | Wrapping up         | 17:00 — start finishing up, push your work.
17:00 | 15  | Log out!            | 18:00 — work day is over. Log out and rest. | Blow | daily logout

[late]
after = 18:30
repeat = 30
title = "⚠️ Working late!"
message = "It's {time}. You should have logged out by now! {status}"
sound = Sosumi
command = daily logout

[daily_update]
enabled = true
after = 09:15
title = "Daily update"
message = "Send your daily status update in Slack"
sound = Hero

[lunch]
# Enable automatic consideration of logging out/in for lunch (enabled by default)
enabled = true
# Lunch start and end times (HH:MM)
start = 12:30
end = 13:30
# Commands to run (or include in notification) when lunch starts/ends
logout_command = daily logout
login_command = daily login
# Titles and messages for logout/login notifications
logout_title = "Lunch time — log out"
logout_message = "It's lunchtime. Log out and enjoy your break."
login_title = "Back from lunch — log in"
login_message = "Welcome back! Log in and resume your work."
sound = Glass
