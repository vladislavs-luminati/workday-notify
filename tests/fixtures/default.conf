# Test config fixture
name = "Test Schedule"

[schedule]
08:00 | 75  | Good morning!       | Time to log in and start your day. | | login
10:30 | 15  | Break time          | 10:30 — stand up, stretch. 5–10 min.
12:30 | 15  | Lunch break         | Step away from the screen.
14:00 | 15  | Break time          | 14:00 — short break, rest your eyes.
15:30 | 15  | Break time          | 15:30 — stretch, walk around.
17:00 | 15  | Wrapping up         | Start finishing up, push your work.
17:30 | 15  | Log out!            | Work day is over. Log out and rest. | Blow | logout

[late]
after = 18:00
repeat = 30
title = "⚠️ Working late!"
message = "It's {time}. You should have logged out by now! {status}"
sound = Sosumi
command = logout

[commands]
login = daily login
logout = daily logout
status = daily status

[daily_update]
enabled = true
after = 09:15
title = "Daily update"
message = "Send your daily status update in Slack"
sound = Hero
slack = true
