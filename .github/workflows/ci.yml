name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck -x -s bash src/workday-notify.sh src/platform/*.sh
          shellcheck -s bash install.sh uninstall.sh setup.sh
          shellcheck -s bash tests/test_helper.sh tests/mock_platform.sh

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: bash tests/test_schedule.sh
